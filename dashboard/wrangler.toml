name = "clawsweeper-status"
main = "worker.ts"
account_id = "91b59577e757131d68d55a471fe32aca"
compatibility_date = "2026-05-11"
workers_dev = true

[triggers]
crons = ["*/5 * * * *"]

[assets]
directory = "./public"
[[durable_objects.bindings]]
name = "STATUS_STORE"
class_name = "StatusStore"

[[durable_objects.bindings]]
name = "EXACT_REVIEW_QUEUE"
class_name = "ExactReviewQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["StatusStore"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["ExactReviewQueue"]

[[routes]]
pattern = "clawsweeper.openclaw.ai"
custom_domain = true

[vars]
CLAWSWEEPER_REPO = "openclaw/clawsweeper"
CLAWSWEEPER_APP_CLIENT_ID = "Iv23liOECG0slfuhz093"
CLAWSWEEPER_CRABFLEET_URL = "https://crabfleet.openclaw.ai"
TARGET_REPOS = "openclaw/openclaw,openclaw/clawhub,openclaw/clawsweeper,openclaw/fs-safe"
WORKER_BUDGET = "128"
WORKER_DETAIL_RUN_LIMIT = "128"
WORKER_JOB_FETCH_CONCURRENCY = "12"
WORKER_JOB_CACHE_TTL_SECONDS = "60"
WORKER_HEALTH_CACHE_TTL_SECONDS = "120"
WORKER_HEALTH_FETCH_CONCURRENCY = "10"
AUTOMERGE_CACHE_TTL_SECONDS = "300"
RECENT_CLOSED_CACHE_TTL_SECONDS = "300"
CACHE_TTL_SECONDS = "20"
INCLUDE_CI_STATUS = "1"
EXACT_REVIEW_QUEUE_MAX_CONCURRENT = "64"
EXACT_REVIEW_TARGET_MAX_CONCURRENT = "60"
EXACT_REVIEW_PUBLICATION_MIN_CONCURRENT = "50"
EXACT_REVIEW_PUBLICATION_BASE_CONCURRENT = "50"
EXACT_REVIEW_PUBLICATION_MAX_CONCURRENT = "50"
EXACT_REVIEW_DISPATCH_LEASE_MS = "360000"
EXACT_REVIEW_EXECUTION_LEASE_MS = "7800000"
EXACT_REVIEW_HEARTBEAT_GRACE_MS = "1200000"
EXACT_REVIEW_WORKFLOW_PAUSED_RETRY_MS = "60000"
EXACT_REVIEW_DISPATCH_DEBOUNCE_MS = "90000"
EXACT_REVIEW_DISPATCH_DEBOUNCE_MAX_MS = "180000"
EXACT_REVIEW_PENDING_SOFT_LIMIT = "300"
# Keep each mutation lease at 8 while allowing four isolated workflows to prepare
# concurrently. Final commits still cross the single state-writer coordinator.
# A full-window publish moves ~2k paths and observed ~40 min; the drain lease
# must outlive it or the ack lands after expiry and the cycle makes no progress.
STATE_APPEND_DRAIN_LEASE_MS = "5400000"
EXACT_REVIEW_PUBLICATION_BATCHING_ENABLED = "1"
EXACT_REVIEW_PUBLICATION_BATCH_SIZE = "8"
EXACT_REVIEW_PUBLICATION_BATCH_MAX_CONCURRENT = "4"
# Reserve two members for recent protocol-v2 tuples that still match the
# queue's current source revision. The other six members keep draining FIFO.
EXACT_REVIEW_PUBLICATION_FRESH_LANE_ENABLED = "1"
EXACT_REVIEW_PUBLICATION_FRESH_LANE_MAX_ITEMS = "2"
EXACT_REVIEW_PUBLICATION_FRESH_LANE_MAX_AGE_MS = "900000"
EXACT_REVIEW_PUBLICATION_BATCH_WAIT_MS = "60000"
EXACT_REVIEW_PUBLICATION_BATCH_DISPATCH_COOLDOWN_MS = "30000"
EXACT_REVIEW_PUBLICATION_BATCH_DISPATCH_RESERVATION_MS = "600000"
REVIEW_OBSERVABILITY_REQUIRED = "0"
REVIEW_RECOVERY_ENABLED = "0"
