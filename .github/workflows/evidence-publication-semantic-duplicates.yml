name: Evidence - publication semantic duplicates

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Reproduce cross-run publication retention
        run: |
          mkdir -p evidence
          node --test --test-name-pattern="current queue identity retains cross-run publication artifacts for the same source snapshot" \
            test/exact-review-publication-batches.test.ts | tee evidence/reproduction.log
      - name: Verify queue identity source
        run: |
          {
            grep -n -F 'producerRunId}:${decision.publication.producerRunAttempt}' dashboard/exact-review-queue.ts
            grep -n -F 'item.key > cursor' dashboard/exact-review-queue.ts
          } | tee evidence/source-map.log
      - uses: actions/upload-artifact@v7
        with:
          name: publication-semantic-duplicate-evidence
          path: evidence/
          if-no-files-found: error
