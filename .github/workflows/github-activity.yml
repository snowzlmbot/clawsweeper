name: github activity to openclaw

on:
  repository_dispatch:
    types:
      - github_activity
  issues:
    types:
      - opened
      - reopened
      - edited
      - closed
      - labeled
      - unlabeled
      - assigned
      - unassigned
  issue_comment:
    types:
      - created
      - edited
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - edited
      - closed
      - labeled
      - unlabeled
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
  workflow_run:
    workflows:
      - sweep
      - repair cluster worker
      - repair publish cluster results
      - commit review
    types:
      - completed

permissions:
  contents: write
  actions: read
  issues: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: >-
    github-activity-${{ github.event.client_payload.activity.repo || github.event.repository.full_name || github.repository }}-${{ github.event_name == 'workflow_run' && 'workflow-run' || 'activity' }}
  cancel-in-progress: true

jobs:
  notify:
    if: >-
      ${{
        !(github.event_name == 'pull_request_target' && github.event.action == 'synchronize') &&
        !(github.event_name == 'repository_dispatch' && github.event.client_payload.activity.type == 'pull_request_target' && github.event.client_payload.activity.action == 'synchronize') &&
        !(github.event_name == 'workflow_run' && contains(fromJSON('["success","neutral","skipped"]'), github.event.workflow_run.conclusion))
      }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Check core API budget
        id: core-budget
        env:
          GH_TOKEN: ${{ github.token }}
          MIN_CORE_REMAINING: ${{ vars.CLAWSWEEPER_MIN_CORE_REMAINING || '250' }}
        run: |
          set -euo pipefail
          budget="$(gh api rate_limit --jq '[.resources.core.remaining, .resources.core.reset] | @tsv')"
          remaining="${budget%%$'\t'*}"
          reset="${budget##*$'\t'}"
          threshold="$MIN_CORE_REMAINING"
          if [ "$remaining" -lt "$threshold" ]; then
            reset_iso="$(date -u -d "@$reset" '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || echo "$reset")"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping noncritical GitHub activity notification; core remaining=$remaining threshold=$threshold reset=$reset_iso."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch spam comment intake candidates
        if: steps.core-budget.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          payload_path="$RUNNER_TEMP/spam-comment-intake-dispatch.json"
          if ! node <<'NODE' > "$payload_path"; then
            echo "No spam comment intake candidate for this activity."
            exit 0
          fi
          const fs = require("fs");
          const eventName = process.env.GITHUB_EVENT_NAME || "";
          const root = JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH, "utf8"));
          const clientPayload = root.client_payload || {};
          const activity = clientPayload.activity || clientPayload || {};
          const type = activity.type || clientPayload.event_name || (eventName === "repository_dispatch" ? "" : eventName);
          const action = activity.action || clientPayload.action || root.action || "";
          if (!["issue_comment", "pull_request_review_comment"].includes(type)) process.exit(1);
          if (!["created", "edited"].includes(action)) process.exit(1);
          const repo =
            activity.target_repo ||
            activity.repo ||
            (activity.repository && activity.repository.full_name) ||
            (typeof activity.repository === "string" && activity.repository) ||
            clientPayload.target_repo ||
            clientPayload.repo ||
            (clientPayload.repository && clientPayload.repository.full_name) ||
            (typeof clientPayload.repository === "string" && clientPayload.repository) ||
            (root.repository && root.repository.full_name) ||
            process.env.GITHUB_REPOSITORY;
          process.stdout.write(JSON.stringify({
            event_type: "clawsweeper_spam_comment_intake",
            client_payload: {
              target_repo: repo,
              event_name: type,
              action,
              activity: { ...activity, type, action, repo },
            },
          }));
          NODE
          gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
            --method POST \
            --input "$payload_path"

      - uses: actions/checkout@v6
        if: steps.core-budget.outputs.skip != 'true'
        with:
          ref: ${{ github.event.repository.default_branch }}
          filter: blob:none
          persist-credentials: false

      - uses: actions/setup-node@v6
        if: steps.core-budget.outputs.skip != 'true'
        with:
          node-version: "24"

      - name: Enable pinned pnpm
        if: steps.core-budget.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          for attempt in 1 2 3; do
            if corepack prepare "pnpm@10.33.2" --activate; then
              exit 0
            fi
            sleep "$((attempt * 10))"
          done
          corepack prepare "pnpm@10.33.2" --activate

      - name: Resolve pnpm store
        id: pnpm-store
        if: steps.core-budget.outputs.skip != 'true'
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        if: steps.core-budget.outputs.skip != 'true'
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-10.33.2-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-10.33.2-
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        if: steps.core-budget.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi
            sleep "$((attempt * 10))"
          done
          pnpm run build:repair

      - name: Feed activity to OpenClaw
        if: steps.core-budget.outputs.skip != 'true'
        env:
          CLAWSWEEPER_OPENCLAW_HOOK_URL: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_URL }}
          CLAWSWEEPER_OPENCLAW_HOOK_TOKEN: ${{ secrets.CLAWSWEEPER_OPENCLAW_HOOK_TOKEN }}
          CLAWSWEEPER_OPENCLAW_AGENT_ID: ${{ vars.CLAWSWEEPER_OPENCLAW_AGENT_ID || 'clawsweeper' }}
          CLAWSWEEPER_DISCORD_TARGET: ${{ vars.CLAWSWEEPER_DISCORD_TARGET }}
        run: |
          set -euo pipefail
          pnpm run repair:notify-github-activity -- --write-report
